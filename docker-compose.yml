services:
  postgres:
    # Bundles TimescaleDB (sensor_readings hypertable) and pgvector (regulation
    # embeddings) — the single-Postgres-instance decision from docs/SYSTEM_DESIGN.md §2.
    image: timescale/timescaledb-ha:pg16
    container_name: safety_db
    environment:
      POSTGRES_USER: safety
      POSTGRES_PASSWORD: safety123
      POSTGRES_DB: industrial_safety
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety -d industrial_safety"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Local LLM for alert/report generation — a real alternative to Claude, not just a
  # static template. See config.py's LLM_PROVIDER: "ollama" (this), "claude", or "auto"
  # (Claude if a key is set, else this) — switch anytime.
  ollama:
    image: ollama/ollama:latest
    container_name: safety_ollama
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s

  ollama-init:
    image: ollama/ollama:latest
    container_name: safety_ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    entrypoint: ["/bin/sh", "-c"]
    command: ["OLLAMA_HOST=ollama:11434 ollama pull ${OLLAMA_MODEL:-qwen2.5:3b}"]
    restart: "no"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safety_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://safety:safety123@postgres:5432/industrial_safety
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENVIRONMENT=production
      - PLANT_CONFIG_PATH=plant.config.yaml
      - LLM_PROVIDER=${LLM_PROVIDER:-ollama}
      - OLLAMA_URL=http://ollama:11434
      - OLLAMA_MODEL=${OLLAMA_MODEL:-qwen2.5:3b}
    depends_on:
      postgres:
        condition: service_healthy
      ollama:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safety_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

volumes:
  postgres_data:
  ollama_data:

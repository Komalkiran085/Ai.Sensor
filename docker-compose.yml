services:
  postgres:
    # Bundles TimescaleDB (sensor_readings hypertable) and pgvector (regulation
    # embeddings) — the single-Postgres-instance decision from docs/SYSTEM_DESIGN.md §2.
    image: timescale/timescaledb-ha:pg16
    container_name: safety_db
    environment:
      POSTGRES_USER: safety
      POSTGRES_PASSWORD: safety123
      POSTGRES_DB: industrial_safety
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/home/postgres/pgdata/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U safety -d industrial_safety"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Ollama (local LLM) is disabled here to save disk/RAM — see config.py's LLM_PROVIDER.
  # Set LLM_PROVIDER=ollama and re-add the ollama/ollama-init services below to switch back.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: safety_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://safety:safety123@postgres:5432/industrial_safety
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY}
      - ENVIRONMENT=production
      - PLANT_CONFIG_PATH=plant.config.yaml
      - LLM_PROVIDER=${LLM_PROVIDER:-claude}
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend:/app
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: safety_frontend
    ports:
      - "3000:3000"
    environment:
      - VITE_API_URL=http://localhost:8000
      - VITE_WS_URL=ws://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./frontend/src:/app/src
      - ./frontend/index.html:/app/index.html

volumes:
  postgres_data:
